services:
  - type: web
    name: worksheet-generator-api
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_GENAI_USE_VERTEXAI
        value: false
      - key: APP_NAME
        value: ai-practice-mvp
      - key: DB_PATH
        value: data/sessions.db
      - key: ALLOWED_ORIGINS
        sync: false
